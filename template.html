    <!-- Dev hot-reload: connects only when the page is served from a localhost
         port (i.e. `npm run dev`). On any other host this script is a no-op,
         so it costs ~300 bytes in production and never runs. -->
    <script>
      (() => {
        const host = location.hostname;
        if (host !== "localhost" && host !== "127.0.0.1") return;
        if (!location.port) return;
        const port = parseInt(location.port, 10) + 1;
        try {
          const es = new EventSource(`http://${host}:${port}/__reload`);
          es.addEventListener("reload", () => location.reload());
        } catch {}
      })();
    </script>
